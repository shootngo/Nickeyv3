<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Trailer Inspection - Nickey Dispatch</title>
<meta name="theme-color" content="#1e3a8a">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--blue:#1e3a8a;--gold:#ffd700;--rad:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:#1a1a1a;color:#eee;min-height:100vh;font-size:17px}
.hdr{background:#111;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #ffd700}
.hdr-logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#fff}
.back-btn{background:#333;color:#ffd700;border:none;padding:8px 16px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.sec{background:#252525;border-radius:12px;border:1px solid #333;margin:18px}
.sh{background:#1e3a8a;padding:13px 16px;border-radius:12px 12px 0 0}
.st{font-family:'Rajdhani',sans-serif;font-size:14.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff}
.sb{padding:18px}
.fld{margin-bottom:16px}
.fld label{font-size:13px;font-weight:600;color:#ccc;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px}
.fld input,.fld select,.fld textarea{border:1.8px solid #555;border-radius:var(--rad);padding:13px;font-size:17px;background:#2a2a2a;color:#eee;width:100%;outline:none}
.fld input:focus,.fld select:focus{border-color:#ffd700}
.check-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.check-row label{font-size:15px;flex:1}
.check-row input[type="checkbox"]{width:22px;height:22px;accent-color:#4caf50}
.item-notes{width:100%;margin-top:6px;font-size:14px}
.action-btn{width:100%;padding:14px;background:#4caf50;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:20px}
.autosave-pill{position:fixed;top:72px;right:14px;background:rgba(30,60,30,0.95);border:1px solid #4caf50;color:#a5d6a7;font-size:12px;font-weight:600;padding:6px 12px;border-radius:14px;z-index:150;opacity:0;transition:opacity 0.3s}
.autosave-pill.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">🚛 TRAILER INSPECTION</div>
  <button onclick="goBackToMain()" class="back-btn">← Back to Dispatch</button>
</div>

<div style="padding:18px;max-width:700px;margin:0 auto">
  <div class="autosave-pill" id="autosavePill">💾 Auto-saved</div>

  <div class="sec">
    <div class="sh"><div class="st">Trip Details</div></div>
    <div class="sb">
      <div class="fld">
        <label>Trailer Number</label>
        <input type="text" id="trailerNum" placeholder="e.g. SD 94" oninput="saveInspectionState()">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="fld">
          <label>Inspection Date</label>
          <input type="date" id="inspDate" oninput="saveInspectionState()">
        </div>
        <div class="fld">
          <label>Time</label>
          <input type="time" id="inspTime" oninput="saveInspectionState()">
        </div>
      </div>
      <div class="fld">
        <label>Driver Name</label>
        <input type="text" id="driverName" oninput="saveInspectionState()">
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sh"><div class="st">Pre-Trip Inspection Checklist</div></div>
    <div class="sb">
      <div class="check-row"><input type="checkbox" id="lights" onchange="saveInspectionState()"><label>All Lights Working (headlights, tail, brake, turn, clearance)</label></div>
      <div class="check-row"><input type="checkbox" id="brakes" onchange="saveInspectionState()"><label>Brakes – Air pressure good, no leaks, adjustment OK</label></div>
      <div class="check-row"><input type="checkbox" id="tires" onchange="saveInspectionState()"><label>Tires – Tread depth, pressure, no cuts/bulges</label></div>
      <div class="check-row"><input type="checkbox" id="wheels" onchange="saveInspectionState()"><label>Wheels/Hubs – No leaks, lug nuts tight, no damage</label></div>
      <div class="check-row"><input type="checkbox" id="suspension" onchange="saveInspectionState()"><label>Suspension – Springs, shocks, airbags OK</label></div>
      <div class="check-row"><input type="checkbox" id="airlines" onchange="saveInspectionState()"><label>Air Lines &amp; Hoses – No cracks, secure, no leaks</label></div>
      <div class="check-row"><input type="checkbox" id="landing" onchange="saveInspectionState()"><label>Landing Gear – Crank works, feet secure</label></div>
      <div class="check-row"><input type="checkbox" id="kingpin" onchange="saveInspectionState()"><label>Kingpin / 5th Wheel – No wear, locked properly</label></div>
      <div class="check-row"><input type="checkbox" id="floor" onchange="saveInspectionState()"><label>Floor Condition – No holes, strong, clean</label></div>
      <div class="check-row"><input type="checkbox" id="walls" onchange="saveInspectionState()"><label>Walls &amp; Roof – No damage, secure</label></div>
      <div class="check-row"><input type="checkbox" id="doors" onchange="saveInspectionState()"><label>Doors &amp; Seals – Close tight, no gaps</label></div>
      <div class="check-row"><input type="checkbox" id="mudflaps" onchange="saveInspectionState()"><label>Mud Flaps – Present and secure</label></div>
      <div class="check-row"><input type="checkbox" id="reflectors" onchange="saveInspectionState()"><label>Reflectors / Conspicuity Tape – All present</label></div>
      <div class="check-row"><input type="checkbox" id="fireext" onchange="saveInspectionState()"><label>Fire Extinguisher – Charged and mounted</label></div>
    </div>
  </div>

  <div class="sec">
    <div class="sh"><div class="st">Notes &amp; Issues</div></div>
    <div class="sb">
      <div class="fld">
        <label>Issues Found / Repairs Needed</label>
        <textarea id="notes" rows="5" placeholder="Describe any problems..." oninput="saveInspectionState()"></textarea>
      </div>
      <div class="fld">
        <label>Overall Status</label>
        <select id="overallStatus" onchange="saveInspectionState()">
          <option value="">— Select —</option>
          <option value="PASS">✅ PASS – Ready to Load</option>
          <option value="CONDITIONAL">⚠️ CONDITIONAL – Minor issues noted</option>
          <option value="FAIL">❌ FAIL – Do Not Use</option>
        </select>
      </div>
    </div>
  </div>

  <button onclick="clearInspection()" class="action-btn" style="background:#cc0000">🗑️ Clear Inspection Form</button>
</div>

<script>
const INSPECTION_KEY = "nickeyInspectionState";

function saveInspectionState() {
  const state = {
    trailerNum: document.getElementById("trailerNum").value,
    inspDate: document.getElementById("inspDate").value,
    inspTime: document.getElementById("inspTime").value,
    driverName: document.getElementById("driverName").value,
    lights: document.getElementById("lights").checked,
    brakes: document.getElementById("brakes").checked,
    tires: document.getElementById("tires").checked,
    wheels: document.getElementById("wheels").checked,
    suspension: document.getElementById("suspension").checked,
    airlines: document.getElementById("airlines").checked,
    landing: document.getElementById("landing").checked,
    kingpin: document.getElementById("kingpin").checked,
    floor: document.getElementById("floor").checked,
    walls: document.getElementById("walls").checked,
    doors: document.getElementById("doors").checked,
    mudflaps: document.getElementById("mudflaps").checked,
    reflectors: document.getElementById("reflectors").checked,
    fireext: document.getElementById("fireext").checked,
    notes: document.getElementById("notes").value,
    overallStatus: document.getElementById("overallStatus").value
  };
  localStorage.setItem(INSPECTION_KEY, JSON.stringify(state));

  // Flash autosave pill
  const pill = document.getElementById("autosavePill");
  if (pill) {
    pill.classList.add("show");
    setTimeout(() => pill.classList.remove("show"), 900);
  }
}

function restoreInspectionState() {
  const raw = localStorage.getItem(INSPECTION_KEY);
  if (!raw) return;
  let state;
  try { state = JSON.parse(raw); } catch(e) { return; }

  const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ""; };
  const setCheck = (id, val) => { const el = document.getElementById(id); if (el) el.checked = !!val; };

  setVal("trailerNum", state.trailerNum);
  setVal("inspDate", state.inspDate);
  setVal("inspTime", state.inspTime);
  setVal("driverName", state.driverName);
  setCheck("lights", state.lights);
  setCheck("brakes", state.brakes);
  setCheck("tires", state.tires);
  setCheck("wheels", state.wheels);
  setCheck("suspension", state.suspension);
  setCheck("airlines", state.airlines);
  setCheck("landing", state.landing);
  setCheck("kingpin", state.kingpin);
  setCheck("floor", state.floor);
  setCheck("walls", state.walls);
  setCheck("doors", state.doors);
  setCheck("mudflaps", state.mudflaps);
  setCheck("reflectors", state.reflectors);
  setCheck("fireext", state.fireext);
  setVal("notes", state.notes);
  setVal("overallStatus", state.overallStatus);
}

function setupPersistence() {
  const ids = ["trailerNum","inspDate","inspTime","driverName","notes","overallStatus"];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", saveInspectionState);
  });

  const checks = ["lights","brakes","tires","wheels","suspension","airlines","landing","kingpin","floor","walls","doors","mudflaps","reflectors","fireext"];
  checks.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("change", saveInspectionState);
  });

  // Also save on select change
  const status = document.getElementById("overallStatus");
  if (status) status.addEventListener("change", saveInspectionState);

  restoreInspectionState();
}

function clearInspection() {
  if (confirm("Clear this inspection form?")) {
    localStorage.removeItem(INSPECTION_KEY);
    location.reload();
  }
}

function goBackToMain() {
  window.location.href = "index.html";
}

// Optional: Try to pull trailer number from main form if available
function tryLoadTrailerFromMain() {
  try {
    const mainState = localStorage.getItem("nickeyDispatchFormState");
    if (mainState) {
      const parsed = JSON.parse(mainState);
      if (parsed.tki && !document.getElementById("trailerNum").value) {
        document.getElementById("trailerNum").value = parsed.tki;
        saveInspectionState();
      }
    }
  } catch(e) {}
}

window.onload = function() {
  setupPersistence();
  tryLoadTrailerFromMain();
};
</script>
</body>
</html>
